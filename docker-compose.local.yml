# ============================================================================
# Memory App + AT Protocol Bridge — Full Local Stack
#
# Runs everything you need to see the Memory app in your browser with live
# AT Protocol federated content flowing in from the Mastopod sidecar.
#
# Services:
#   pg        — PostgreSQL 17 database
#   api       — Memory API (Elysia/Bun) on http://localhost:8794
#   frontend  — Memory UI (Vite/Vue) on http://localhost:5173
#   mastopod  — AT Protocol ingress pipeline (Phase 5.5 local harness)
#
# Usage:
#   docker compose -f docker-compose.local.yml up --build
#
# Then open: http://localhost:5173
# ============================================================================

services:

  # --------------------------------------------------------------------------
  # PostgreSQL — the database for the Memory API
  # --------------------------------------------------------------------------
  pg:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: localpassword
      POSTGRES_DB: memory
    ports:
      - '5432:5432'
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 10

  # --------------------------------------------------------------------------
  # Memory API — Elysia/Bun backend
  # --------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: docker/api.dockerfile
    restart: unless-stopped
    depends_on:
      pg:
        condition: service_healthy
    ports:
      - '8794:8794'
    environment:
      DB_URL: postgres://postgres:localpassword@pg:5432/memory
      JWT_SECRET: local-dev-jwt-secret-change-in-prod
      API_PORT: 8794
      FRONTEND_URL: http://localhost:5174
      FIREHOSE_BRIDGE_SECRET: local-bridge-secret-123
      AP_BRIDGE_SECRET: ${AP_BRIDGE_SECRET:-change-me-ap-secret}
      POD_PROVIDER_BASE_URL: ${POD_PROVIDER_BASE_URL:-http://localhost:3000}
      ACTIVITYPUB_PROXY_BASE_URL: ${ACTIVITYPUB_PROXY_BASE_URL:-http://localhost:3000}
    networks:
      - default
      - activitypods-network
    healthcheck:
      test: ['CMD', 'bun', '-e', 'fetch("http://localhost:8794/health").then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  # --------------------------------------------------------------------------
  # Memory Frontend — Vite/Vue dev server
  # --------------------------------------------------------------------------
  frontend:
    build:
      context: .
      dockerfile: docker/frontend.dockerfile
      args:
        VITE_API_URL: /api
        VITE_POD_PROVIDER_BASE_URL: ${POD_PROVIDER_BASE_URL:-http://localhost:3000}
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - '5173:4000'
    environment:
      BACKEND_URL: http://api:8794

  # --------------------------------------------------------------------------
  # Mastopod AT Protocol Ingress Pipeline (Phase 5.5 local harness)
  # Runs the mock firehose + full ingress pipeline and forwards verified events
  # to the Memory API webhook endpoint.
  # --------------------------------------------------------------------------
  mastopod:
    build:
      context: ../fedify-sidecar
      dockerfile: Dockerfile.local
    restart: unless-stopped
    profiles:
      - legacy-at-harness
    depends_on:
      api:
        condition: service_healthy
    environment:
      MEMORY_WEBHOOK_URL: http://api:8794/at/webhook/ingress
      FIREHOSE_BRIDGE_SECRET: local-bridge-secret-123
      # Preferred mode selector: mock | relay | jetstream
      FIREHOSE_MODE: ${FIREHOSE_MODE:-jetstream}
      # Optional override for Jetstream endpoint/filter params
      JETSTREAM_URL: ${JETSTREAM_URL:-wss://jetstream2.us-east.bsky.network/subscribe?wantedCollections=app.bsky.feed.post&wantedCollections=app.bsky.actor.profile}
      # Optional smoke-mode cutoff for quick proof runs (empty = continuous)
      JETSTREAM_MAX_EVENTS: ${JETSTREAM_MAX_EVENTS:-}
      # Legacy fallback flag used by older scripts (true -> relay mode)
      USE_REAL_FIREHOSE: ${USE_REAL_FIREHOSE:-false}

volumes:
  pg_data:

networks:
  # The api service joins activitypods-network so the fedify-sidecar can POST
  # relay activities to /ap/webhook/ingress without going through the host.
  # The network is owned by fedify-sidecar/docker-compose.yml; run that stack
  # first (or run both with docker compose --project-directory).
  activitypods-network:
    external: true
